name: Terraform CI/CD
 
on:
  pull_request:
    branches:
      - main
 
  push:
    branches:
      - main
 
permissions:
  id-token: write
  contents: read
 
jobs:
 
  # ✅ PLAN JOB (Runs on PR only)
  terraform-plan:
    name: Terraform Plan (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
 
    concurrency:
      group: terraform
      cancel-in-progress: false
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::035711439183:role/vsuawscicd
          aws-region: us-east-1
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform Init
        run: terraform init
 
      - name: Terraform Validate
        run: terraform validate
 
      - name: Terraform Plan
        run: terraform plan
 
  # ✅ APPLY JOB (Runs ONLY after PR merge to main)
  terraform-apply:
    name: Terraform Apply (After Merge)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
 
    concurrency:
      group: terraform
      cancel-in-progress: false
 
    # ✅ Optional: Add approval gate (recommended)
    # environment: production
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::035711439183:role/vsugithubrole
          aws-region: us-east-1
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform Init
        run: terraform init
 
      - name: Terraform Apply
        run: terraform apply -auto-approve